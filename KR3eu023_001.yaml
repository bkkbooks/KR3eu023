body:
  text: 卷一目睛原始歌天有日月陰陽精人有二目臟腑精衆精之窠為之眼肉精上下兩胞名血精兩眥氣精白筋精為黑骨精瞳約束裹擷系屬腦目睛原始要詳明注天有日月猶人之有二目也天之日月乃天之陰陽之精而為之也人之二目亦人之五臟六腑之精上注於目而為之也故衆精之窠為之眼也肉之精為上下胞也血之精為兩眥也氣之精為白眼也筋之精為黑眼也骨之精為瞳仁也約束裹擷氣血筋骨之精其繫上屬於腦不可不明此目睛之原始也五輪所屬部位歌五輪肉血氣風水肉輪兩胞血輪眥氣輪白睛風輪黑水輪瞳子自當知注五輪者肉輪血輪氣輪風輪水輪也謂之輪者目睛運動如輪之意也上下兩胞為肉輪內外兩眥為血輪白睛為氣輪黑睛為風輪瞳仁為水輪此明五輪之部位分屬五臟也肉輪屬脾主肉血輪屬心主血氣輪屬肺主氣風輪屬肝主筋水輪屬腎主骨五輪主五臟病歌胞為脾病眥主心肺白肝黑腎瞳仁五輪為病主五臟寒熱虛實隨證分注胞為肉輪主脾病也內外二眥為血輪主心病也白睛為氣輪主肺病也黑睛為風輪主肝病也瞳仁為水輪主腎病也五輪之病五臟主之其寒熱虛實當隨所現之證而分之也八廓部位歌瞳仁水廓黑睛風天廓白睛部位同內眥火雷外山澤上下胞屬地廓宮注八廓者水廓風廓天廓火廓雷廓山廓澤廓地廓也謂之廓者猶城郭衛御之義也瞳仁屬坎水廓也黑睛屬巽風廓也白睛屬乾天廓也內眥大眥也屬離火震雷之廓也外眥小眥也屬艮山兌澤之廓也兩胞屬坤地廓也此明八廓以八卦立名示人六腑命門包絡之部位也水廓屬膀胱又名津液廓風廓屬膽又名養化廓天廓屬大腸又名傳導廓地廓屬胃又名水穀廓火廓屬小腸又名抱陽廓雷廓屬命門又名關泉廓澤廓屬三焦又名清淨廓山廓屬包絡又名會陰廓八廓所屬歌津液水廓屬膀胱養化風廓是膽方傳導天廓大腸是水穀地廓胃家鄉關泉雷廓命門主抱陽內眥火小腸外眥三焦清淨澤會陰山廓包絡疆注內眥火小腸謂內眥火廓屬小腸也外眥三焦清淨澤謂外眥屬三焦清淨澤廓也津液廓即水廓水廓屬腎腎與膀胱為表裡膀胱為津液之府故又名焉養化廓即風廓風廓屬肝肝與膽為表裡膽為少陽主長養化育故又名焉傳導廓即天廓天廓屬肺肺與大腸為表裡大腸為傳導之官故又名焉水穀廓即地廓地廓屬脾脾與胃為表裡胃納水穀故又名焉抱陽廓即火廓火廓屬心心與小腸為表裡依附於陽故又名焉關泉廓即雷廓命門者龍雷之火故名關泉附於火廓也清淨廓即澤廓三焦者陽相火也蒸化水穀為決瀆之官故名清淨附於火廓也會陰廓即山廓包絡者陰相火也依附於心為臣使之官故名會陰附於火廓也八廓主六腑命門包絡病歌風廓屬膽水膀胱大腸天廓地胃鄉火廓小腸雷廓命山澤三焦包絡方注此明八廓所屬也風廓即風輪也風輪屬肝肝與膽為表裡故輪主臟為肝病廓主腑為膽病水廓即水輪也水輪屬腎腎與膀胱為表裡故輪主臟為腎病廓主腑為膀胱病天廓即氣輪也氣輪屬肺肺與大腸為表裡故輪主臟為肺病廓主腑為大腸病地廓即肉輪也肉輪屬脾脾與胃為表裡故輪主臟為脾病廓主腑為胃病火廓雷廓澤廓山廓即血輪之部位也血輪屬心心與小腸為表裡故輪主臟為心病廓主腑為小腸病其雷廓命門澤廓三焦山廓包絡皆附於血輪者以命門三焦包絡俱屬相火當稟命於君火故當附焉按眼科皆以五輪屬臟配五行八廓屬臟腑配八卦遂使臟腑混淆無所適從夫五輪既屬臟八廓自應屬腑今改訂之俾學者按輪廓之部位視之而病之在臟在腑自能瞭然矣內因為病歌內障皆因傷七情喜怒憂思悲恐驚臟腑內損精不注初為內障久成風注此明內障受病之因也障遮蔽也內障者從內而蔽也內障之病皆因七情過傷過喜傷心過怒傷肝過憂傷肺過思傷脾過悲傷心過恐傷腎過驚傷膽臟腑內損精氣不上注於目故初病內障久成五風烏風緑風黑風黃風青風之患其證不紅不腫瞳仁色變而其光失明也外因為病歌外障皆因六氣生暑寒燥濕火與風內熱召邪乘隙入隨經循繫上頭中注此明外障受病之因也外障者從外而遮也風寒暑濕燥火六氣也外障之病皆因六淫所感然必因其人內熱外蒸腠理不密相召外邪乘虛而入入項屬太陽入面屬陽明入頰屬少陽各隨其經之系上頭入腦中而為患於目焉其證赤痛腫澀眵淚翳膜遮睛也不內外因為病歌病由不內外因者飲食起居擊刺成邪無定體內外障細察其因無遁情注此明不內外因受病之因也既非外感六氣又非內傷七情但因飲食不節傷飽失飢起居不慎勞役過度或遭擊振或被刺損以其邪無定體故或成內障或成外障之病當細察其所因則病無遁情矣內障總名歌內障初患變五風黃緑黑烏青圓冰滑澀浮沉橫散偃黃心黑水棗花形雷頭驚振及瞳缺雀目高風胎患名二十四證為內障須當一一辨分明注內障初患尚未失明之證也久而變成五風之證瞳變黃色者名曰黃風變緑白色者名曰緑風變黑色者名曰黑風變烏紅色者名曰烏風變青色者名曰青風圓者圓翳也冰者冰翳也滑者滑翳也澀者澀翳也浮者浮翳也沉者沉翳也又名深翳橫者橫翳也又名劍脊翳散者散翳也偃者偃月翳也黃心者白翳黃心翳也黑水者黑水凝翳亦名黑花翳棗花者棗花翳也雷頭者雷頭風變內障也驚振者因驚振而成內障也胎患者胎患內障也此內障二十四證之總名也須當一一分辨明白以施治也內障初患久變五風歌內障初患如好眼生花視物霧煙中隱隱似翳瞳失彩久變黃緑黑烏青黃風雀目久金色緑風時見花白紅頭旋額鼻目牽痛黑風見黑緑風同烏風亦與緑不異但痛不旋乃烏風頭旋不痛青風證瞳黃黃風發脾經淺緑如白肺經發黑色黑風腎經名烏帶渾紅心經病青是青風屬肝經外因頭風痛引目腦脂熱注忽失明內因精傷不上注左右相傳漸漸盲或兼外因皆赤痛內因不足補其精注內障初患如同好眼但視物常見五色花飛昏而不明如在霧煙之中瞳中隱隱似翳漸無精彩射人其瞳色或變黃白緑青烏黑渾紅無定久則成五風內障之證也黃風者初病雀目日久瞳變黃色甚而如金難治之證也緑風者初病眼前時見白花紅花頭旋兩額俠鼻痛牽兩目日久瞳變淺緑如白之色黑風者初病與緑風相同但時見黑花日久瞳變昏黑之色烏風者初病亦與緑風之證不異但頭痛而不旋暈眼前常見烏花日久瞳變烏帶渾紅之色青風者初病亦與烏風相同頭雖旋暈而不痛眼前常見青花日久瞳變青色其五風發病之源黃風則發於脾經緑風則發於肺經黑風則發於腎經烏風則發於心經青風則發於肝經然風雖有五其致病之由則有二一曰外因必因頭風其痛引目上攻於腦腦脂與熱合邪下注於目而致兩目忽然失明也一曰內因必因內傷臟腑精氣不上注於目或先病左目後及於右目或先病右目後及於左目左右相傳兩目俱損也外因證屬有餘多兼赤痛當以除風散熱為主內因證屬不足多不赤痛當以補精益氣為主五風初患有餘歌五風初患有餘證除風湯內主羚羊黑苓蠍尾車前子黃芩白芍共硝黃除風湯方羚羊角二錢黑參二錢茯苓二錢蠍尾三分車前子二錢黃芩一錢白芍藥一錢芒硝一錢大黃一錢上為粗末令勻以水二盞煎至一盞食後去滓溫服五風初患不足歌五風初患不足證通明補腎決明參生地桔車茺芍細引經竄散少加軍通明補腎丸方石決明一兩人參二兩生地黃二兩桔梗一兩車前子一兩茺蔚子二兩白芍藥一兩細辛半兩大黃三錢上為細末煉蜜為丸如桐子大空心茶清送下三錢黃風有餘歌已成黃風有餘證須用通脾瀉胃湯知母軍芩茺蔚子石膏梔子黑參防通脾瀉胃湯方知母一錢大黃一錢黃芩一錢五分茺蔚子一錢石膏二錢梔子一錢黑參一錢防風一錢上為粗末以水二盞煎至一盞食後去渣溫服黃風不足歌已成黃風不足證補益脾經山藥丸人參山藥茯苓地澤瀉防風同作丸山藥丸方人參山藥茯苓生地黃澤瀉防風各一兩上為細末煉蜜為丸如桐子大空心茶清送下三錢緑風有餘歌已成緑風有餘證羚羊角飲黑參防茯苓知母黃芩細桔梗羚羊車大黃緑風羚羊飲黑參二錢防風二錢茯苓二錢知母二錢黃芩一錢細辛一錢桔梗二錢羚羊角一錢車前子一錢大黃一錢上為粗末以水二盞煎至一盞食後去渣溫服緑風不足歌已成緑風不足證還睛丸草術參苓羌防菊地蒺蓉薯牛膝葙蒙菟賊芎緑風還睛丸方甘草白朮人參茯苓羌活防風菊花生地黃蒺藜肉蓯蓉山藥牛膝青葙子密蒙花菟絲子木賊川芎各一兩上為細末煉蜜為丸桐子大空心茶清送三錢黑風有餘歌已成黑風有餘證羚羊角飲黑羚羌車前桔梗黃芩共柴胡茺蔚細辛防黑風羚羊飲黑參一錢羚羊角一錢羌活一錢車前子一錢半桔梗一錢黃芩一錢柴胡一錢茺蔚子一錢半細辛五分防風一錢上為粗末以水二盞煎至一盞食後去渣溫服黑風不足歌已成黑風不足證補腎丸中熟地黃澤瀉茺蔚五味子細辛山藥菟絲良補腎丸方熟地黃一兩澤瀉一兩茺蔚子一兩五味子三錢細辛三錢山藥一兩菟絲子一兩上為細末煉蜜為丸桐子大每服二錢空心鹽湯下烏風有餘歌已成烏風有餘證決明丸內決明辛桔梗防風茺蔚子車茯山藥共元參烏風決明丸方石決明二兩細辛五錢桔梗防風茺蔚子車前子茯苓山藥元參各二兩上為細末煉蜜為丸如桐子大食前茶清送下三錢烏風不足歌已成烏風不足證補肝散內用川芎熟地當歸蒺藜芍木賊夏枯草防風烏風補肝散方川芎熟地黃當歸蒺藜白芍藥木賊夏枯草防風各一錢上為粗末以水二盞煎至一盞食前去渣溫服青風有餘歌已成青風有餘證羚羊湯內用羚羊元參地骨車前子川芎羌活細辛良青風羚羊湯方羚羊角一錢元參一錢地骨皮一錢車前子一錢五分川芎一錢羌活一錢細辛五分上為粗末以水二盞煎至一盞食遠溫服青風不足歌已成青風不足證還睛散內用苓參防風地骨車前子羌活川芎共細辛青風還睛散方茯苓人參防風地骨皮車前子羌活川芎細辛各等分上為粗末以水二盞煎至一盞食後去渣溫服圓翳歌圓翳青白一點圓宛如油點水中間肝風沖腦脂下注明視翳小暗看寬虛熱羚羊飲車細參芩防知一同煎實用防風芩桔梗硝黃茺黑細知前注圓翳內障初起之時黑睛上一點青白宛如油點浮於水面暗處視之其翳青白而大明處看之其形差小緣肝風上衝腦脂下注所致宜審其虛實而調之虛者用羚羊角飲子清其虛熱實者宜防風散泄其熱邪也圓翳羚羊飲羚羊角一錢車前子一錢細辛五分人參一錢黃芩一錢防風二錢知母一錢上為粗末以水二盞煎至一盞夜食後去渣溫服圓翳防風散方防風二錢黃芩一錢桔梗二錢芒硝一錢大黃一錢茺蔚子一錢黑參一錢細辛五分知母二錢車前子一錢上為粗末以水二盞煎至一盞食後去渣溫服冰翳歌冰翳瞳色亮如冰陰看陽看無二形睛中隱隱白透外肺風肝熱合邪攻對證雖當針督脈出血若多反傷睛還睛參味防知細芩桔車前元地茺注冰翳內障瞳色堅實白亮如冰之狀無論陰處及日中視之皆一般無二非若圓翳之明暗有別也其睛內有白色隱隱透出於外此證乃肝熱肺風合邪上攻入目為患宜按穴刺之出血則愈但督脈不宜出血過多若出血過多恐加昏暗也內服之藥宜還睛丸清而補之穴名上星在鼻直上入髮際一寸陷中冰翳