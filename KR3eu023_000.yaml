body:
  text: 補遺能遠怯近歌近視昏蒙遠視明陽光有餘損陰精須用地芝丸枳殼菊花生地共天冬注能遠怯近者謂視物遠則能見近則昏蒙也蓋由其人陽氣有餘陰精不足故光華散亂不能收斂於近也宜用地芝丸養陰久服則目自愈地芝丸方枳殼去穰菊花各三兩生地黃焙乾天門冬去心各四兩上為細末煉蜜為丸桐子大每服百丸食後茶清送下能近怯遠歌近視清明遠視昏陽光不足被陰侵定志丸用菖蒲遠硃砂人參白茯神注能近怯遠者非生成近視謂平昔無此證忽視物近則明瞭遠則昏暗也由其人陰氣偏盛陽氣不足陽被陰侵是以光華不能發越於遠也宜定志丸補心壯神神足則自能遠視矣定志丸方菖蒲二兩遠志去心二兩硃砂研細另用三錢人參一兩白茯神一兩上為細末煉蜜為丸桐子大以硃砂為衣每服五十丸食後米飲湯送下瞳神散大歌瞳神散大風輪窄邪熱蒸之風氣攻或因思怒痰寒瘧地黃丸內芍歸芎防己丹柴知二地丹參獨柏味寒茺注瞳神散大者謂瞳神散大風輪反為窄窄一周甚則一周如線乃邪熱內蒸風氣上攻所致亦有因憂思氣怒痰火傷寒瘧疾經産敗血等證而成宜用地黃丸地黃丸方一名羌活退翳丸白芍藥酒炒一兩三錢當歸身酒炒五錢川芎酒洗三錢防己酒製二錢牡丹皮酒洗三錢柴胡三錢知母鹽水炒三錢熟地黃焙八錢生地黃八錢丹參五錢獨活三錢黃柏酒製五錢五味子三錢寒水石三錢茺蔚子五錢上為細末煉蜜為丸桐子大每服三錢空心白滾湯送下瞳神縮小歌瞳神縮小如針簪勞傷精血損腎肝視不甚昏微隱澀清腎抑陽黃柏連草決苓歸生地芍獨活知母枸杞寒注瞳神縮小者謂瞳神漸漸縮小如簪腳甚則如針乃淫欲勞傷精血虧損腎肝二經所致其證視物不甚昏惟覺羞明隱澀宜用清腎抑陽丸壯水以制陽也清腎抑陽丸方黃柏鹽水制二兩黃連酒炒二兩草決明炒一兩白茯苓二兩當歸酒洗炒一兩生地黃二兩白芍藥酒炒一兩獨活八錢知母鹽水制二兩枸杞子二兩寒水石另研二兩上為細末煉蜜為丸如桐子大每服三錢空心白滾湯送下乾澀昏花歌乾澀昏花肝腎病酒色勞瞻思慮傷四物五子車前子覆盆枸杞菟絲當熟地川芎芍地膚五膽膏宜外點良注乾澀昏花者謂目覺乾澀不爽視物昏花也此乃肝腎俱傷之候或因嗜酒恣欲或勞瞻竭視或思慮太過皆成此證宜用四物五子丸滋陰養水略帶抑火以培其本也四物五子丸方車前子酒蒸覆盆子枸杞子菟絲子酒煮爛當歸酒洗熟地黃川芎白芍藥地膚子各等分上為細末煉蜜為丸桐子大每服二錢不拘時鹽湯送下五膽膏方見卷末白眼痛歌白眼痛病不紅腫紅絲赤脈沙澀疼肺脾濕熱兼伏火須辨赤脈三陽經桑皮湯澤元芩桔菊草旋苓桑麥冬注白眼痛者俗呼為害白眼其證不紅不腫沙澀疼痛多生紅絲赤脈乃脾肺絡傷濕熱兼氣分伏火上衝所致須看赤脈紅絲以辨三陽從上而下者太陽也羌活為使從下而上者陽明也升麻為使從外至內者少陽也柴胡為使宜桑白皮湯主之桑白皮湯方澤瀉八分元參八分黃芩一錢桔梗七分菊花五分甘草二分半旋覆花一錢茯苓七分桑白皮七分麥門冬去心一錢上為粗末以水二盞煎至一盞去渣溫服女子逆經歌女子逆經血灌瞳滿眼如朱胬肉生總因血熱經阻逆通經蘇木大黃紅芩連羌薄梔香附生地歸芍賊草芎注女子逆經之證乃血逆上行沖灌瞳仁以致滿眼赤澀或生胬肉總由血熱經阻不行因而上逆也宜用通經散破血通經其血翳自退通經散方蘇木一兩大黃五錢紅花一兩黃芩二兩黃連羌活薄荷黑梔子香附生地黃當歸赤芍藥木賊甘草川芎各一兩上為粗末令勻每服五錢以水一盞半煎至七分食後去渣溫服行經目痛歌女子行經目澀疼眩暈頭疼雲翳生去血過多肝臟損當歸補血薄羌茺柴胡蒺藜菊防草生地當歸白芍芎注行經目痛者女子遇經行之際眼目澀痛頭疼眩暈腫澀難開生翳於黑睛上或如粟米或花翳白陷此因經行去血過多肝經虛損故也宜用當歸補血湯治之當歸補血湯方薄荷五分羌活五分茺蔚子一錢柴胡八分蒺藜一錢菊花八分防風八分甘草四分生地黃二錢當歸一錢五分白芍藥一錢川芎八分上為粗末以水二盞煎至一盞食後去渣溫服妊娠目病歌妊娠目病有餘證須辨氣分血分醫氣分旋螺瞳散大天冬飲用茯苓知羌活防風參五味血分瘀血並凝脂保胎芩芥歸芍草連翹芎地縮陳皮注妊娠目病者為有餘之證有氣分血分之別屬氣分者多見旋螺瞳仁散大乃氣分之熱宜天門冬飲屬血分者多生瘀血凝脂翳障乃血分之熱宜用保胎清火湯以治之天門冬飲天門冬一錢五分茯苓一錢知母一錢五分羌活五分防風五分人參五分五味子五分上為粗末以水二盞煎至一盞食後去渣溫服保胎清火湯方黃芩一錢二分荊芥穗當歸身白芍藥各一錢甘草炙三分連翹一錢川芎八分生地黃縮砂仁陳皮各一錢上為粗末以水二盞煎至一盞食遠去渣溫服産後病目歌産後患目血不足病有三因治可通思哭勞瞻多內障嗜辛厚味外障成外因頭風風爛濕四物補肝香附芎夏枯熟地歸芍草隨人加減可收功注産後患目乃去血過多不足之證病雖有三因之別而治法可以加減變通內因者多緣思慮哭泣或竭視勞瞻致成內障須四物補肝湯倍熟地芎歸外因者因嗜辛辣厚味或因頭風致成風赤濕爛宜本方倍香附川芎夏枯草隨證加減以治之四物補肝湯方香附酒製一錢五分川芎一錢夏枯草二錢熟地黃焙乾四錢當歸身酒洗二錢白芍藥酒洗一錢五分甘草炙五分上為粗末以水二盞煎至一盞食遠去渣溫服附外治方焮腫膏方膩粉少許黃蠟代赭石研各五錢細磁末黃柏細末麻油各一兩上為極細末入銅杓內入油蠟同煎為膏塗患處紫金膏方爐甘石爐甘石入大銀罐內鹽泥封固用炭火煅一炷香以罐通紅為度取起為末用黃連水飛過再入黃芩黃連黃柏湯內將湯煮乾以甘石如松花色四兩黃丹入鍋內炒黑色用草試之草灼提起如此三次研極細末水飛四兩硼砂研細飛過三錢硃砂研細飛過三錢輕粉五分青鹽水洗去泥五分珍珠三錢白丁香乳汁化開去渣五分沒藥五分乳香五分海螵蛸去皮研細二錢枯礬五分硇砂五分當歸研細五分川芎研細五分黃連研細五分甘草研細五分麝香五分冰片五分如法炮製各研極細無聲用好白蜜十五兩入鍋內熬去沫只用白蜜十兩先下爐甘石攪勻次下黃丹攪勻再下諸藥不住手攪勻如紫金色不黏手為度石燕丹方爐甘石爐甘石入大銀罐內鹽泥封固用炭火煅一炷香以罐通紅為度取起為末用黃連水飛過再入黃芩黃連黃柏湯內將湯煮乾以甘石如松花色四兩硼砂銅杓內同水煮乾石燕琥珀硃砂水飛各取淨末一錢五分鷹屎白如無白丁香代之一錢冰片麝香各分半上為極細末研至無聲每用少許水蘸點眼大眥枯澀無淚加熊膽白蜜血翳加真阿魏黃翳加雞內金風熱翳加蕤仁熱翳加珍珠牛黃冷翳加附子尖雄黃老翳倍硼砂加豬胰子摩風膏方黃連細辛當歸杏仁去皮尖為霜防風松脂各五錢白芷黃蠟各一兩麻油四兩先將蠟油熔化前藥共研為細末慢火熬膏貼太陽穴摩障靈光膏方黃連銼如豆大一兩童便浸一宿曬乾為末黃丹水飛三兩當歸酒洗二錢麝香五分乳香五分輕粉一錢硇砂一錢白丁香一錢龍腦一錢海螵蛸俱另研細末一錢爐甘石以黃連一兩煎水淬七次研細六兩先用好白蜜十兩熬五七沸以淨紙搭去蠟面除黃丹外下余藥用柳木攪勻次下黃丹再攪慢火徐徐攪至紫色卻將乳香麝香輕粉硇砂和勻入上藥內以不黏手為度廣大重明湯方防風菊花龍膽草甘草細辛各等分上為粗末水一盞煎半盞去渣帶熱熏洗五膽膏方豬膽汁黃牛膽汁羊膽汁鯉魚膽汁各二錢五分白蜜二兩胡黃連研末青皮研末川黃連研末熊膽各二錢五分上將諸藥末與蜜並膽汁和勻入瓷瓶內以細紙封頭牢系坐飯甑中蒸待飯熟為度
