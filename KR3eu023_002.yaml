body:
  text: 卷二外障總名歌外障暴赤血灌瞳硬睛赤垂與黃沖蟹睛旋螺並胬肉雞冠蜆肉祟疼同突睛漏睛連鶻眼拳毛倒睫胞凝逢眥赤花陷及黑釘喎僻冰瑕黏睛並玉翳水輪逆順障瞼出風粟又混睛撞破撞刺及針刺眼癢淚出瘡痍生客熱傷寒並肝熱因他痰核天水行青盲赤爛癍瘡病轉關生贅疳眼名小兒通睛恙雖小還有眯目證為輕此為外障四十八熟讀方知各證情注外障者或因內熱或因外邪或內外合邪致生目赤腫痛翳膜等證也暴者暴赤生翳也血灌瞳者血灌瞳仁也硬睛者瞼硬睛疼也赤垂者赤膜下垂也黃沖者黃膜上衝也蟹睛者形如蟹睛而疼痛也旋螺者形如旋螺尖起也胬肉者胬肉攀睛也喎疼者神喎疼痛也突睛者突起睛高也漏睛者漏睛膿出也鶻眼者鶻眼凝睛也胞凝者胞肉膠凝也眥赤者兩眥赤脈也花陷者花翳白陷也黑者黑翳如珠也釘者釘翳根深也喎僻者風牽喎僻也冰瑕者冰瑕翳深也黏睛者兩瞼黏睛也玉翳者玉翳浮滿也水輪者膜入水輪也逆順者逆順生翳也撞破者被物撞破也撞刺者撞刺生翳也針刺者痛如針刺也淚出者衝風淚出也瘡痍者風赤瘡痍也客熱者暴風客熱也傷寒者傷寒熱病後患目也肝熱者肝虛積熱也因他者因他病後生翳也痰核者睥生痰核也天水者天水行後赤眼也赤爛者胎風赤爛也癍瘡者癍瘡入眼也轉關者轆轤轉關也生贅者瞼中生贅也此外障四十八證之總名讀者誠能熟習玩味自因病而各得其情矣暴赤生翳歌暴赤生翳心肝病風熱上壅痛難當赤腫熱淚羞明癢最宜劆洗出血良初起先用蘆根飲黑連硝黃芩與防去翳鎮肝藁石決辛薯參苓車味羌注暴赤生翳其證赤腫生翳癢痛難當時流熱淚羞明乃心肝二經風熱上壅攻目所致宜劆洗出血服蘆根飲子清其內熱後服鎮肝丸劆音廉劆者或以針鋒微刺之或以燈心草微刮之也蘆根飲子蘆根一錢黑參一錢五分黃連一錢芒硝一錢大黃一錢黃芩一錢五分防風一錢上為粗末以水二盞煎至一盞食後去渣溫服鎮肝丸方藁本一兩五錢石決明煅二兩細辛三錢山藥炒人參茯苓車前子各一兩五味子三錢羌活一兩上羅為細末煉蜜為丸如桐子大空心茶清送下三錢血灌瞳仁歌血灌瞳仁目睛痛猶如血灌色相同膽汁肝血因熱耗血為火迫灌睛瞳急用止痛沒藥散硝黃血竭引茶清痛止大黃當歸散賊芩梔子菊蘇紅注血灌瞳仁目睛疼痛瞳仁如血灌紅色緣肝血熱耗膽汁皆虧血因火迫灌入瞳中宜服止痛沒藥散止疼後服大黃當歸散止痛沒藥散方沒藥二兩芒硝一兩半大黃一兩半血竭一兩上搗篩為細末食後熱茶清調下一錢大黃當歸散方大黃一兩當歸二錢木賊一兩黃芩一兩梔子五錢菊花三錢蘇木五錢紅花八錢上為細末令勻每服二錢食遠茶清調下瞼硬睛疼歌瞼硬睛疼胞腫硬瘀血翳膜目睛疼膈中積熱肝風盛外塗焮腫劆瘀紅涼膈硝黃車前黑黃芩知母梔仁茺注瞼硬睛疼初患之時時覺疼脹久則瞼胞腫硬睛珠疼痛此緣膈中積熱肝經風毒上衝於目宜劆洗去瘀外塗焮腫膏內服涼膈散焮腫膏方見卷末涼膈散方芒硝大黃車前子各一錢黑參一錢半黃芩知母梔子炒茺蔚子各一錢上為粗末以水二盞煎至一盞食後溫服赤膜下垂歌赤膜下垂覆睛瞳赤膜從氣下垂風此屬肝肺熱沖眼淚流痛癢如硃紅羚羊知母黃芩黑桔梗柴胡梔子茺注赤膜下垂初患之時氣輪上邊起赤膜一片垂至風輪下覆瞳仁緣肝肺之熱衝於眼內致生赤膜淚流痛癢宜服羚羊飲羚羊飲羚羊角鎊一錢五分知母黃芩黑參桔梗柴胡梔子炒各一錢茺蔚子二錢上為粗末以水二盞煎至一盞食後去渣溫服黃膜上衝歌黃膜一片氣輪起上衝風輪覆蓋瞳赤澀淚眵疼痛極此因脾胃熱風攻通脾瀉胃黃芩黑防軍知母梔膏茺立應白芷羊躑躅鵝不食草麝歸雄注黃膜上衝自氣輪而起一片黃膜從下直衝風輪上掩瞳仁乃脾胃風熱上衝於眼致生黃膜淚流赤澀疼痛極甚宜通脾瀉胃湯外嗅立應散通脾瀉胃湯方黃芩一錢五分黑參防風大黃知母炒梔子炒各一錢石膏煅二錢茺蔚子二錢上為粗末以水二盞煎至一盞食遠去渣溫服立應散方白芷羊躑躅花減半鵝不食草洗淨曬乾麝香少許當歸雄黃另研後入各等分上為細末每用少許含水嗅鼻內去盡濁涕淚出為度蟹睛疼痛歌蟹睛努出蟹睛形烏珠極痛澀羞明肝膽積熱腎虛熱虛軟不疼實硬疼實者瀉肝車地骨硝黃知母黑柴茺虛宜鎮腎味知地山藥菟辛石決靈注蟹睛之證烏睛努出如豆如珠形似蟹睛疼痛極甚澀淚羞明初起為實硬而極痛久則為虛軟而不疼總因肝膽積熱沖睛腎中虛熱注目所致實者宜瀉肝湯虛者用鎮腎決明丸瀉肝湯方車前子地骨皮芒硝各一錢大黃知母各一錢半黑參一錢柴胡二錢茺蔚子二錢上為粗末以水二盞煎至八分去渣空心溫服鎮腎決明丸方五味子半兩知母炒生地黃山藥炒各一兩半菟絲子一兩細辛半兩石決明煅一兩上為細末煉蜜為丸桐子大空心茶清送三錢旋螺尖起歌旋螺尖起如螺殼烏睛色變極痛疼殼形尖起色青黑肝經積熱血瘀凝輕宜瀉腦防辛梗赤芍天冬五味茺重者瀉肝硝黃桔柴芩知母細車行注旋螺外障氣輪之內烏珠色變青白如螺獅之殼其色初青久黑其形尖圓乃肝經積熱亢極瘀血凝滯所致輕者宜瀉腦湯重者用瀉肝飲子瀉腦湯方防風二錢細辛五分桔梗一錢赤芍藥一錢天門冬去心一錢五味子五分茺蔚子二錢上為粗末以水二盞煎至一盞食後去渣溫服瀉肝飲子芒硝大黃桔梗柴胡黃芩知母炒細辛車前子各一錢上為粗末以水二盞煎至一盞食後去渣溫服胬肉攀睛歌胬肉攀睛大眥起初侵風輪久掩瞳或癢或疼漸積厚赤爛多年肺熱壅初起紫金膏點效久宜鉤割尉烙攻內服除風湯蔚桔細辛連味大黃風注胬肉攀睛之證起於大眥初則漸侵風輪久則掩過瞳仁或癢或痛漸漸積厚此證多因赤爛年久或肺經風熱壅盛所致初起可點紫金膏胬瘀自退久則堅韌難消必須鉤割尉烙後服除風湯除風湯方茺蔚子一錢桔梗一錢細辛五分黃連一錢五味子五分大黃一錢防風一錢上為末以水二盞煎至一盞食後去渣溫服紫金膏方見卷末雞冠蜆肉歌雞冠蜆肉內眥生胃心積熱共肝風或青或赤如雞蜆輕侵風輪重掩瞳鉤割後服抽風桔硝黃車黑細芩風茺蔚丸芩石決黑軍苓山藥地黃茺注雞冠蜆肉之證起於睥眥之內或青或赤如雞冠蜆肉之形漸漸而長從大眥侵及風輪久則掩及全目此乃脾胃積熱肝風上衝所致先宜用手法鉤割後服抽風湯或茺蔚丸抽風湯方桔梗一錢芒硝一錢五分大黃一錢車前子一錢黑參一錢五分細辛一錢黃芩一錢五分防風二錢上為粗末以水二盞煎至一盞食後去渣溫服茺蔚丸方黃芩一兩石決明煅一兩黑參一兩大黃一兩茯苓一兩山藥炒二兩生地黃一兩五錢茺蔚子二兩上為細末煉蜜為丸桐子大空心茶清下三錢神祟疼痛歌神祟疼痛忽然發胞熱睛疼緣肺肝洗肝散用硝黃桔梔子黃芩知母添黑參熱甚加歸地外點還宜石燕丹注神祟疼痛之證平素無病忽然發動瞼皮火熱睛珠如刺極痛難當此肺肝風熱上攻於眼不可劆洗宜服酒調洗肝散外點石燕丹酒調洗肝散方朴硝大黃桔梗梔子黃芩知母炒黑參各等分熱甚者加生地黃當歸尾上為末每服二三錢溫酒調下日服二次石燕丹方見卷末突起睛高歌突起睛高珠腫疼風熱毒火上衝睛針後退熱桔梗飲硝黃茺芍黑芩風還睛五味參苓細山藥車前防遠茺注突起睛高之證緣風熱火毒上衝於眼疼痛難忍睛珠突高脹起宜先用針出其清涎毒水後服退熱桔梗飲子用還睛丸調理可愈退熱桔梗飲子桔梗芒硝大黃茺蔚子白芍藥炒黑參黃芩防風各一錢上為粗末以水二盞煎至一盞食後去渣溫服還睛丸方五味子半兩人參二兩茯苓一兩細辛半兩山藥一兩車前子防風遠志茺蔚子各二兩上為細末煉蜜丸桐子大空心茶清送下三錢漏睛膿出歌漏睛膿出瞼眥間或流膿汁或清涎目無翳障不疼痛風熱攻衝心火炎竹葉瀉經湯柴瀉升麻竹葉草車前黃芩草決川羌活苓芍將軍梔子連注漏睛膿出之證生於瞼眥或流膿水或淌清涎目無翳障不疼不痛乃風熱攻衝心火上炎宜用竹葉瀉經湯主之竹葉瀉經湯方柴胡五分澤瀉四分升麻五分青竹葉十片甘草炙五分車前子四分黃芩六分草決明四分川羌活五分白茯苓四分赤芍藥四分大黃六分梔子仁炒五分川黃連五分上為粗末以水二盞煎至一盞食後溫服鶻眼凝晴歌鶻眼凝睛睛突定目珠脹硬痛難當積熱上衝腦熱注外用摩風針血良內服瀉肝湯桔蔚柴防芩黑共硝黃注鶻眼凝睛之證睛突於外不能動轉堅硬高努如鶻眼脹滿疼痛難忍此積熱上衝腦中風熱壅注於目所致宜先用金針出血瀉毒外敷摩風膏內服瀉肝湯摩風膏方見卷末瀉肝湯方桔梗茺蔚子柴胡防風黃芩黑參芒硝大黃各等分上為粗末以水二盞煎至一盞食後去渣溫服倒睫拳毛歌倒睫拳毛內刺睛皮鬆弦緊癢兼疼磣澀難開胞瞼爛肝風脾熱兩相壅細辛湯用知茺黑軍細防風桔梗羚注倒睫拳毛之證由皮鬆弦緊故拳毛倒入內刺睛珠磣澀難開眼胞赤爛癢而兼疼此乃脾熱肝風合邪上壅所致宜用細辛湯內清邪熱外散風邪也細辛湯方知母二錢茺蔚子二錢黑參一錢大黃一錢細辛一錢防風二錢桔梗一錢羚羊角鎊一錢上為粗末以水二盞煎至一盞食後去渣溫服胞肉膠凝歌胞肉膠凝胞肉腫初小漸大摩隱瞳胃脾風熱上攻目通脾瀉胃熱風清注胞肉膠凝之證睥中蠹肉壅起初小漸大摩隱瞳仁眼胞濕爛眵淚膠黏此乃脾胃中邪風積熱上壅於目所致宜用通脾瀉胃湯散風清熱兩解其邪通脾瀉胃湯方見黃膜上衝下兩眥赤脈歌眥赤病屬心經火大眥多實小眥虛實者洗心散歸芍麻黃連芥大黃梔虛者九仙芩芥芍菊芎歸草芷通宜注眥赤之證赤脈起於大眥者心經之實火也赤脈起於小眥者心經之虛熱也實者用洗心散兩解其實邪虛者宜九仙散清降其虛熱也七寶洗心散方當歸一錢赤芍藥一錢麻黃八分黃連一錢荊芥八分大黃一錢梔子一錢上為粗末以水二盞煎至一盞食後去渣溫服九仙散方黃芩荊芥赤芍藥菊花川芎當歸甘草白芷木通各一錢上為粗末以水二盞煎至一盞食後服花翳白陷歌花翳白陷在烏睛四圍漸起漫神瞳狀如棗花魚鱗翳肺肝風熱腦中衝知母飲子防風桔知母硝黃芩細茺注花翳白陷者乃黑睛生翳風輪四圍漸起中間低陷其翳狀如棗花魚鱗之形烏睛或白或帶微黃此因肺肝積熱風邪上衝於腦所致宜用知母飲子知母飲子防風一錢五分桔梗一錢五分知母一錢芒硝一錢大黃一錢五分茯苓一錢細辛一錢茺蔚子一錢上為粗末以水二盞煎至一盞食後去渣溫服黑翳如珠歌黑翳如珠黑睛上形如珠子黑而圓淚出羞澀疼痛甚大人肝腎虛風愆通明補腎丸可服小兒患此名眼疳羚羊角飲硝黃細知母羚防一併煎注黑翳如珠之證黑睛上有黑翳圓如珠子之形淚出羞澀難開疼痛極甚若大人患此證為肝腎虛熱風邪宜用通明補腎丸小兒患此證為實熱眼疳宜服羚羊角飲子泄其實熱也通明補腎丸方見五風初患不足下羚羊角飲子芒硝一錢大黃一錢細辛五分知母一錢羚羊角鎊一錢防風二錢上為粗末以水二盞煎至一盞食遠溫服釘翳根深歌釘翳根深睛內生硬似釘頭極痛疼赤澀羞明時淚出肝心毒熱上衝瞳除熱飲子知母桔硝黃茺蔚黑芩風注釘翳根深者睛中翳黑